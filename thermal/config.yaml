# ============================================================
# Thermal Tank Level Detection — Configuration
# ============================================================
# Camera confirmed on N-1065:
#   /dev/video0  USB VID:PID 0bda:5830  Generic USB Camera
#   Formats available: YUYV 256x192 @ 25fps, YUYV 256x384 @ 25fps
#   -> 256x384 is the DUAL frame: top 256x192 = visual, bottom 256x192 = thermal raw
# ============================================================

site:
  # Identifies this Nucleus in the supervisor dashboard. Override with SITE_ID env.
  id: N-1065

camera:
  device: /dev/video0
  width: 256
  height: 384          # 384 = dual_yuyv mode (confirmed 2026-04-17)
  fps: 25
  decoder: dual_yuyv
  kelvin_divisor: 64.0
  # Set to true to auto-probe /dev/video* and pick the matching VID:PID at start
  autodetect: true
  vid_pid: "0bda:5830"

analysis:
  interval_seconds: 2
  smoothing_window: 7
  min_samples: 5
  gradient_method: sobel
  invert_level: false
  # Drop publish when overall confidence is below this (low/high). Prevents
  # the Node-RED chart from filling with garbage 0/100 spikes when the ROI
  # is not pointing at a real tank wall.
  publish_only_high_confidence: true

tanks:
  # Placeholder ROIs — will be set after the camera points at real tanks.
  # You can also draw them interactively on the web dashboard (pencil icon).
  - id: tank_01
    name: "Tank 1"
    medium: water
    roi: { x: 30,  y: 10, w: 40, h: 170 }
    min_temp_delta: 1.2
    geometry:
      height_ft: 22.0
      diameter_ft: 12.0
      shape: vertical_cylinder
  - id: tank_02
    name: "Tank 2"
    medium: oil
    roi: { x: 140, y: 10, w: 40, h: 170 }
    min_temp_delta: 1.0
    geometry:
      height_ft: 16.0
      diameter_ft: 10.0
      shape: vertical_cylinder

# HTTP POST to Node-RED endpoint (set up in the shipped flow)
publisher:
  endpoint: "http://host.docker.internal:1880/thermal/ingest"
  # Fallback for hosts without host.docker.internal (pre-Docker 20): use --network=host
  # and set endpoint to "http://127.0.0.1:1880/thermal/ingest"
  timeout: 3.0

stream:
  enabled: true
  port: 8080
  fps: 20              # was 5 — the camera does 25 natively
  upscale: 2
  jpeg_quality: 75
  draw_overlay: true
  # Which frame the MJPEG stream shows:
  #   visual   -> top half of dual frame (grayscale visible-light)
  #   thermal  -> palette-rendered bottom half (hottest = bright)
  #   blend    -> thermal palette blended with visual
  source: thermal
  # Palette: grayscale | iron | rainbow | hot | inferno | plasma | jet | magma | turbo | cividis
  palette: iron
  # Image transforms applied BEFORE overlay/upscale
  rotate: 0            # 0 | 90 | 180 | 270
  flip_h: false
  flip_v: false
  # Temperature display range. When null, auto-stretch from current min/max.
  # Set to fixed numbers (e.g. range_min: 15.0, range_max: 45.0) to pin the palette.
  range_min: null
  range_max: null
  # Isotherm highlight: pixels with temp in this window painted with highlight_color.
  # Set isotherm_enabled: true to activate. color is BGR.
  isotherm_enabled: false
  isotherm_min: 35.0
  isotherm_max: 60.0
  isotherm_color: [255, 255, 255]
  # Pause the live frame (still streams but thermal/visual snapshot is frozen)
  freeze: false
  # Temperature overlays painted on the stream
  overlay:
    roi_boxes: true
    level_line: true
    min_marker: true
    max_marker: true
    center_crosshair: false
    grid: false
    temp_scale: true       # colorbar with min/max °C
    fps_counter: true
    tank_labels: true
  # Video recording destination (inside the container; /app/data is mounted to host)
  recording_dir: /app/data/recordings
  snapshot_dir:  /app/data/snapshots

# Web dashboard specifics (served by the Flask app on stream.port)
ui:
  title: "Thermal Tank Monitor"
  # Units the UI displays
  temp_unit: C          # C | F
  # Emissivity (adjust per medium — water ~0.96, oil ~0.94, steel painted ~0.9)
  emissivity: 0.95
  # Reflective / background temperature (°C), used if you later add emissivity
  # correction. Harmless default.
  reflect_temp_c: 20.0
  # Minimum gradient (°C) required to mark a tank reading as "trusted"
  trust_threshold_c: 1.0
  # Primary unit the operator console shows for level ("ft" or "in").
  level_unit: ft
  # Origins allowed to iframe the :8080 console/stream. CSP frame-ancestors.
  iframe_origins: "https://*.datadesng.com"

# Latest auto-calibration result (populated by POST /api/calibrate)
calibration:
  emissivity: null
  reflect_temp_c: null
  range_min_c: null
  range_max_c: null
  range_locked: false
  calibrated_at: null
  notes: []
